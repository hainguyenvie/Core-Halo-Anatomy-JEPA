name: core_halo
seed: 2
output_dir: outputs/poc/core_halo/seed_2
device: auto
data:
  kind: synthetic
  manifest: null
  image_size: 128
  batch_size: 16
  num_workers: 0
  train_samples: 512
  calibration_samples: 128
  test_samples: 256
  test_anomaly_fraction: 0.5
  min_brain_fraction: 0.05
  strict_healthy_train: true
model:
  in_channels: 1
  patch_size: 8
  embed_dim: 96
  encoder_depth: 3
  predictor_depth: 2
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.0
  core_size: 2
  halo_size: 1
  context_radius: 5
  include_contralateral: false
  contralateral_size: 2
train:
  epochs: 20
  lr: 0.0003
  min_lr: 1.0e-06
  weight_decay: 0.05
  warmup_epochs: 2
  ema_decay_start: 0.99
  ema_decay_end: 0.9995
  targets_per_image: 2
  cosine_loss_weight: 0.1
  grad_clip: 1.0
  amp: true
  log_every: 20
score:
  geometry_stride: 1
  geometry_batch_size: 64
  variance_floor: 0.0001
  shrinkage: 0.1
  threshold_percentile: 99.5
  smoothing_sigma: 0.0
  image_score_percentile: 99.0
  save_examples: 12
