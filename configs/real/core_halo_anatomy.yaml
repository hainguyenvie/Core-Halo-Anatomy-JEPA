name: core_halo_anatomy_real
seed: 0
output_dir: outputs/real/core_halo_anatomy
device: auto

data:
  kind: slice_manifest
  manifest: data/slices/manifest.csv
  image_size: 240
  batch_size: 8
  num_workers: 4
  strict_healthy_train: true

model:
  in_channels: 1
  patch_size: 8
  embed_dim: 128
  encoder_depth: 4
  predictor_depth: 2
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  core_size: 2
  halo_size: 1
  context_radius: 6
  include_contralateral: true
  anatomy_mode: mirror
  contralateral_size: 2

train:
  epochs: 50
  lr: 0.0003
  min_lr: 0.000001
  weight_decay: 0.05
  warmup_epochs: 5
  ema_decay_start: 0.99
  ema_decay_end: 0.9995
  targets_per_image: 4
  cosine_loss_weight: 0.1
  grad_clip: 1.0
  amp: true

score:
  geometry_stride: 1
  geometry_batch_size: 64
  variance_floor: 0.0001
  shrinkage: 0.1
  threshold_percentile: 99.5
  smoothing_sigma: 1.0
  image_score_percentile: 99.0
  save_examples: 24
